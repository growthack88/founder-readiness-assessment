<script type="text/babel">
const {useState,useEffect,useRef}=React;
const dimensions=[{id:"mindset",title:"عقلية المؤسس",titleEn:"Founder Mindset",icon:"🧠",color:"#E8A838",questions:["لدي سبب داخلي قوي يجعلني أبدأ، لا مجرد رغبة في اللقب أو الظهور","أستطيع تحمّل ستة أشهر من العمل دون نتائج واضحة أو مكافآت سريعة","أدرك أن الطريق مليء بالمشقة، ولست متوقعًا نجاحًا ورديًا سريعًا","أمتلك الشجاعة لطلب المشورة حين أحتاج، ولا أتوهم أنني أعرف كل شيء","أملك قدرة حقيقية على التعلّم السريع وتغيير المسار عند الحاجة","لدي استعداد لاتخاذ قرارات صعبة — حتى لو كانت مؤلمة — لحماية المشروع","أعرف من هم الداعمون الحقيقيون في رحلتي، وأميّز بينهم وبين المتفرجين","لدي نية واضحة للأثر والرسالة، تتجاوز الربح والإنجاز الشخصي"]},{id:"idea",title:"وضوح الفكرة",titleEn:"Idea Clarity",icon:"💡",color:"#5B8DEF",questions:["أفهم من هو العميل الذي أخدمه","أعرف المشكلة بدقة، لا بالانطباع","أستطيع وصف فكرتي دون استخدام مصطلحات كبيرة","مستعد لإطلاق نسخة صغيرة بدائية","قادر على تلقي النقد دون دفاع","أملك القدرة على تغيير الفكرة إذا تطلّب السوق","أُدرك أن التنفيذ أهم من الخيال","أستطيع اختبار فكرتي خلال 48 ساعة"]},{id:"team",title:"الفريق والثقافة",titleEn:"Team & Culture",icon:"👥",color:"#6BC9A0",questions:["لدينا قيم واضحة مُطبّقة، لا مجرد شعارات","نختار الأشخاص بناءً على السلوك قبل المهارة","القرارات الصعبة لا نتأخر فيها","لدينا شفافية في الحوار والخلافات","لا يوجد موظف نجم يخلق سُمّية","كل عضو يعرف مسؤوليته ونطاق تأثيره","نعطي حرية… ولدينا محاسبة عادلة","الفريق يعرف لماذا وليس فقط ماذا"]},{id:"product",title:"المنتج والسوق",titleEn:"Product & Market",icon:"🚀",color:"#E06B6B",questions:["حدّدت مشكلة واحدة فقط سأحلها في النسخة الأولى — لا عشر مشاكل","أستطيع شرح منتجي في 30 ثانية لشخص لا يعرفني","اختبرت فكرتي على عملاء حقيقيين — لا أصدقاء ولا عائلة","أملك طريقة لقياس اهتمام الناس (تسجيلات، طلبات، دفع)","مستعد لتغيير المسار (Pivot) إذا قال السوق لا","أعرف الفرق بين الناس أعجبتهم الفكرة والناس دفعوا مقابلها","بنيت أو أستطيع بناء نسخة أولية بأقل الموارد","لدي خطة لجمع الملاحظات وتحليلها — لا فقط إطلاق المنتج والانتظار"]},{id:"leadership",title:"القيادة واتخاذ القرار",titleEn:"Leadership & Decisions",icon:"⚡",color:"#9B6BDE",questions:["أستطيع أن أقول لا أعرف الآن دون شعور بالخجل أو الضعف","أشارك فريقي الصورة كما هي، بلا تزييف وبلا تهويل","أستطيع اتخاذ قرار حتى عندما تكون المعطيات ناقصة","أستمع بجدية لآراء فريقي وأعدّل قراراتي عند الحاجة","أقبل التغيير في الاتجاه إذا أثبت الواقع أنني كنت مخطئًا","أرى الأزمات مساحة للنمو، لا فقط مصدرًا للتهديد","أعرف أن دوري الحقيقي هو خدمة من أقودهم، لا أن أعلو فوقهم","أتحمّل مسؤولية قراراتي ولا ألوم الظروف أو الآخرين"]},{id:"business",title:"نموذج العمل والتمويل",titleEn:"Business Model & Funding",icon:"💰",color:"#E8A838",questions:["أستطيع تحديد شريحة عملائي بدقة — لا الجميع","أعرف القيمة الحقيقية التي أقدمها — لا الميزات التقنية","حدّدت القنوات التي سأصل بها للعميل","لدي تصوّر واضح لمصادر الدخل (اشتراك، عمولة، بيع مباشر...)","أعرف تكاليفي الأساسية وأستطيع تقديرها","حدّدت الشركاء الذين أحتاجهم للنجاح","نموذجي مكتوب ومرئي — لا فقط في رأسي","أراجع النموذج وأعدّله بناءً على ما يحدث في السوق"]},{id:"balance",title:"التوازن والاستدامة",titleEn:"Balance & Sustainability",icon:"⚖️",color:"#5B8DEF",questions:["أنام عدد ساعات كافٍ ومنتظم أغلب الأيام","أمارس نشاطًا بدنيًا (رياضة، مشي، سباحة) بانتظام","لدي وقت ثابت للعائلة لا يُلغى بسبب العمل","أستطيع إغلاق هاتفي لساعات دون قلق","لدي هوايات أو اهتمامات خارج العمل","أشعر بالرضا عن حياتي، لا فقط عن إنجازاتي","صحتي الجسدية في وضع جيد (وزن، فحوصات، طاقة)","أستطيع أن أقول كفى لنفسي حين أحتاج راحة"]},{id:"ai",title:"الجاهزية للذكاء الاصطناعي",titleEn:"AI Readiness",icon:"🤖",color:"#6BC9A0",questions:["أستخدم الذكاء الاصطناعي في مرحلة واحدة على الأقل (فكرة / تصميم / تسويق / مالية)","فريقي يعرف كيف يستخدم أدوات AI في مهامه اليومية","أفهم أن الذكاء الاصطناعي يُكمل العقل ولا يستبدله","لدي قاعدة بيانات قوية — لأن البيانات وقود كل نظام ذكي","أربط أدواتي ببعضها (CRM + HR + Finance + Marketing)","أستخدم الذكاء الاصطناعي لتسريع العمل لا لاستبدال الفهم","لدي سياسات واضحة للاستخدام الأخلاقي للذكاء الاصطناعي","أُدرّب فريقي على التفكير بالذكاء الاصطناعي لا الخوف منه"]}];
const levelConfig={explorer:{title:"مستكشف",titleEn:"Explorer",range:"0-25%",emoji:"🌱",color:"#E06B6B",bg:"rgba(224,107,107,0.08)",message:"أنت في بداية الرحلة. الوعي بالفجوات هو أول خطوة حقيقية.",advice:"ركز على فهم نفسك وسوقك قبل أي تنفيذ. اقرأ الجزء الأول من الكتاب بعناية."},builder:{title:"بانٍ",titleEn:"Builder",range:"26-50%",emoji:"🔨",color:"#E8A838",bg:"rgba(232,168,56,0.08)",message:"عندك أساس جيد لكن فيه فجوات مهمة تحتاج تسدّها.",advice:"حدد أضعف 3 محاور وابدأ فيهم. الكتاب فيه أدوات عملية لكل محور."},launcher:{title:"منطلق",titleEn:"Launcher",range:"51-75%",emoji:"🚀",color:"#5B8DEF",bg:"rgba(91,141,239,0.08)",message:"أنت جاهز للانطلاق. عندك رؤية ومهارات تحتاج فقط شحذ.",advice:"ركز على المحاور الأضعف — هي اللي ممكن تعطلك في لحظة حرجة."},master:{title:"مؤسس جاهز",titleEn:"Ready Founder",range:"76-100%",emoji:"👑",color:"#6BC9A0",bg:"rgba(107,201,160,0.08)",message:"أنت في وضع قوي جدًا. السوق ينتظرك.",advice:"حافظ على التوازن واستمر في التعلم. حتى أقوى المؤسسين يراجعون أنفسهم."}};
function getLevel(pct){if(pct<=25)return levelConfig.explorer;if(pct<=50)return levelConfig.builder;if(pct<=75)return levelConfig.launcher;return levelConfig.master;}
function RadialChart({percentage,size=180,stroke=12,color}){const r=(size-stroke)/2;const circ=2*Math.PI*r;const[anim,setAnim]=useState(0);useEffect(()=>{let start=null;const dur=1400;const step=(ts)=>{if(!start)start=ts;const p=Math.min((ts-start)/dur,1);const ease=1-Math.pow(1-p,3);setAnim(ease*percentage);if(p<1)requestAnimationFrame(step);};requestAnimationFrame(step);},[percentage]);return(<svg width={size} height={size} style={{transform:"rotate(-90deg)"}}><circle cx={size/2} cy={size/2} r={r} fill="none" stroke="rgba(255,255,255,0.06)" strokeWidth={stroke}/><circle cx={size/2} cy={size/2} r={r} fill="none" stroke={color} strokeWidth={stroke} strokeDasharray={circ} strokeDashoffset={circ-(circ*anim)/100} strokeLinecap="round" style={{transition:"stroke 0.3s"}}/><text x={size/2} y={size/2} textAnchor="middle" dominantBaseline="central" fill="#fff" fontSize={size*0.22} fontWeight="800" fontFamily="'Outfit', sans-serif" style={{transform:"rotate(90deg)",transformOrigin:"center"}}>{Math.round(anim)}%</text></svg>);}
function DimensionBar({dim,score,max,delay}){const pct=Math.round((score/max)*100);const[w,setW]=useState(0);useEffect(()=>{const t=setTimeout(()=>setW(pct),delay);return()=>clearTimeout(t);},[pct,delay]);const lev=pct<=25?"ضعيف":pct<=50?"متوسط":pct<=75?"جيد":"ممتاز";return(<div style={{marginBottom:16}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}><span style={{fontSize:14,color:"#ccc",fontFamily:"'Noto Kufi Arabic', sans-serif"}}>{dim.icon} {dim.title}</span><div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:12,color:dim.color,fontFamily:"'Outfit', sans-serif",fontWeight:600}}>{lev}</span><span style={{fontSize:13,color:"#888",fontFamily:"'Outfit', sans-serif"}}>{score}/{max}</span></div></div><div style={{height:8,borderRadius:99,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}><div style={{height:"100%",width:`${w}%`,borderRadius:99,background:`linear-gradient(90deg, ${dim.color}, ${dim.color}aa)`,transition:"width 1s cubic-bezier(.4,0,.2,1)"}}/></div></div>);}
function FounderReadiness(){const[screen,setScreen]=useState("landing");const[currentDim,setCurrentDim]=useState(0);const[currentQ,setCurrentQ]=useState(0);const[answers,setAnswers]=useState({});const[fadeClass,setFadeClass]=useState("fi");const containerRef=useRef(null);const totalQ=dimensions.reduce((a,d)=>a+d.questions.length,0);const answeredCount=Object.keys(answers).length;const globalProgress=Math.round((answeredCount/totalQ)*100);const dim=dimensions[currentDim];const q=dim?.questions[currentQ];const qKey=`${currentDim}-${currentQ}`;
const transition=(cb)=>{setFadeClass("fo");setTimeout(()=>{cb();setFadeClass("fi");},250);};
const handleAnswer=(val)=>{const newAnswers={...answers,[qKey]:val};setAnswers(newAnswers);setTimeout(()=>{transition(()=>{if(currentQ<dim.questions.length-1){setCurrentQ(currentQ+1);}else if(currentDim<dimensions.length-1){setCurrentDim(currentDim+1);setCurrentQ(0);}else{setScreen("results");}});},300);};
const goBack=()=>{if(currentQ>0){transition(()=>setCurrentQ(currentQ-1));}else if(currentDim>0){transition(()=>{setCurrentDim(currentDim-1);setCurrentQ(dimensions[currentDim-1].questions.length-1);});}};
const calcResults=()=>{let total=0;let maxTotal=0;const dimScores=dimensions.map((d,di)=>{let s=0;d.questions.forEach((_,qi)=>{s+=answers[`${di}-${qi}`]||0;});total+=s;maxTotal+=d.questions.length*3;return{dim:d,score:s,max:d.questions.length*3};});const pct=Math.round((total/maxTotal)*100);return{dimScores,total,maxTotal,pct};};
const styles=`@import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800;900&family=Noto+Kufi+Arabic:wght@300;400;500;600;700;800;900&display=swap');*{box-sizing:border-box;margin:0;padding:0}body{background:#0a0a0f}.fi{opacity:1;transform:translateY(0);transition:all .3s ease}.fo{opacity:0;transform:translateY(12px);transition:all .2s ease}.opt-btn{width:100%;padding:14px 20px;border-radius:14px;border:1.5px solid rgba(255,255,255,0.08);background:rgba(255,255,255,0.03);color:#ccc;font-size:15px;cursor:pointer;text-align:right;direction:rtl;font-family:'Noto Kufi Arabic',sans-serif;transition:all .2s ease;display:flex;align-items:center;gap:12px}.opt-btn:hover{border-color:rgba(255,255,255,0.2);background:rgba(255,255,255,0.06);transform:translateX(-4px)}.opt-btn.selected{border-color:var(--ac);background:var(--ac-bg);color:#fff}.landing-btn{padding:18px 48px;border-radius:16px;border:none;font-size:18px;font-weight:700;cursor:pointer;font-family:'Noto Kufi Arabic',sans-serif;transition:all .25s ease;letter-spacing:-0.3px}.landing-btn:hover{transform:translateY(-2px);box-shadow:0 12px 40px rgba(0,0,0,0.4)}.dim-pill{padding:6px 14px;border-radius:99px;font-size:11px;font-weight:600;font-family:'Noto Kufi Arabic',sans-serif;white-space:nowrap;border:1px solid rgba(255,255,255,0.06);transition:all .2s}.glow{position:absolute;border-radius:50%;filter:blur(100px);pointer-events:none;opacity:0.12}@keyframes pulse{0%,100%{opacity:.12}50%{opacity:.2}}.glow-anim{animation:pulse 6s ease-in-out infinite}@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}.float{animation:float 4s ease-in-out infinite}.result-card{background:rgba(255,255,255,0.03);border:1px solid rgba(255,255,255,0.06);border-radius:20px;padding:32px;position:relative;overflow:hidden}`;
if(screen==="landing"){return(<div style={{minHeight:"100vh",background:"#0a0a0f",color:"#fff",position:"relative",overflow:"hidden"}}><style>{styles}</style><div className="glow glow-anim" style={{width:400,height:400,background:"#E8A838",top:-100,right:-100}}/><div className="glow glow-anim" style={{width:300,height:300,background:"#5B8DEF",bottom:-50,left:-50,animationDelay:"3s"}}/><div style={{maxWidth:600,margin:"0 auto",padding:"60px 24px",textAlign:"center",position:"relative",zIndex:1}}><div className="float" style={{fontSize:64,marginBottom:24}}>🧭</div><div style={{display:"inline-block",padding:"6px 20px",borderRadius:99,background:"rgba(232,168,56,0.12)",border:"1px solid rgba(232,168,56,0.2)",marginBottom:20}}><span style={{fontFamily:"'Outfit', sans-serif",fontSize:12,fontWeight:600,color:"#E8A838",letterSpacing:1.5,textTransform:"uppercase"}}>Founder Readiness Assessment</span></div><h1 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:36,fontWeight:900,lineHeight:1.4,marginBottom:16,background:"linear-gradient(135deg, #fff 0%, #aaa 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>اختبار جاهزية المؤسس</h1><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:16,color:"#888",lineHeight:1.8,marginBottom:40,maxWidth:480,margin:"0 auto 40px"}}>اكتشف مدى جاهزيتك لتأسيس شركتك الناشئة عبر تقييم شامل لـ 8 محاور أساسية مبني على كتاب<span style={{color:"#E8A838"}}> "طريقك لبناء Startup" </span></p><div style={{display:"grid",gridTemplateColumns:"repeat(2, 1fr)",gap:12,marginBottom:40,textAlign:"right",direction:"rtl"}}>{dimensions.map((d)=>(<div key={d.id} style={{display:"flex",alignItems:"center",gap:10,padding:"12px 16px",borderRadius:14,background:"rgba(255,255,255,0.03)",border:"1px solid rgba(255,255,255,0.06)"}}><span style={{fontSize:20}}>{d.icon}</span><div><div style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:13,fontWeight:600,color:"#ddd"}}>{d.title}</div><div style={{fontFamily:"'Outfit', sans-serif",fontSize:11,color:"#666"}}>{d.titleEn}</div></div></div>))}</div><div style={{display:"flex",gap:16,justifyContent:"center",marginBottom:32,flexWrap:"wrap"}}>{[{n:"64",l:"سؤال"},{n:"8",l:"محاور"},{n:"5",l:"دقائق"}].map((s)=>(<div key={s.l} style={{textAlign:"center"}}><div style={{fontFamily:"'Outfit', sans-serif",fontSize:28,fontWeight:800,color:"#fff"}}>{s.n}</div><div style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:12,color:"#666"}}>{s.l}</div></div>))}</div><button className="landing-btn" onClick={()=>{setScreen("quiz");setFadeClass("fi");}} style={{background:"linear-gradient(135deg, #E8A838, #D4922A)",color:"#0a0a0f"}}>ابدأ التقييم ←</button><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:11,color:"#555",marginTop:20}}>مبني على كتاب "طريقك لبناء Startup" — محمد حميدة</p></div></div>);}
if(screen==="quiz"){const dimProgress=Math.round(((currentQ+1)/dim.questions.length)*100);const optLabels=[{val:0,ar:"لا ينطبق",en:"Not at all"},{val:1,ar:"قليلاً",en:"Slightly"},{val:2,ar:"غالباً",en:"Mostly"},{val:3,ar:"تماماً",en:"Absolutely"}];return(<div style={{minHeight:"100vh",background:"#0a0a0f",color:"#fff",position:"relative",overflow:"hidden"}}><style>{styles}</style><div className="glow" style={{width:300,height:300,background:dim.color,top:-80,left:"50%",marginLeft:-150}}/><div style={{maxWidth:560,margin:"0 auto",padding:"32px 24px",position:"relative",zIndex:1}}><div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:24}}><button onClick={goBack} style={{background:"none",border:"none",color:"#666",fontSize:13,cursor:"pointer",fontFamily:"'Outfit', sans-serif",padding:"8px 0"}}>{(currentDim>0||currentQ>0)?"← رجوع":""}</button><span style={{fontFamily:"'Outfit', sans-serif",fontSize:13,color:"#555"}}>{answeredCount}/{totalQ}</span></div><div style={{height:3,borderRadius:99,background:"rgba(255,255,255,0.06)",marginBottom:32,overflow:"hidden"}}><div style={{height:"100%",width:`${globalProgress}%`,background:"linear-gradient(90deg, #E8A838, #5B8DEF, #6BC9A0)",borderRadius:99,transition:"width 0.5s ease"}}/></div><div style={{display:"flex",gap:6,marginBottom:28,overflowX:"auto",paddingBottom:4}}>{dimensions.map((d,i)=>{const done=i<currentDim;const active=i===currentDim;return(<div key={d.id} className="dim-pill" style={{background:active?`${d.color}18`:done?"rgba(255,255,255,0.04)":"transparent",color:active?d.color:done?"#555":"#333",borderColor:active?`${d.color}40`:"rgba(255,255,255,0.04)"}}>{d.icon} {done?"✓":""}</div>);})}</div><div className={fadeClass}><div style={{marginBottom:28}}><div style={{display:"flex",alignItems:"center",gap:12,marginBottom:8}}><span style={{fontSize:28}}>{dim.icon}</span><div><h2 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:20,fontWeight:800,color:"#fff",margin:0}}>{dim.title}</h2><span style={{fontFamily:"'Outfit', sans-serif",fontSize:12,color:"#555",fontWeight:500}}>{dim.titleEn}</span></div></div><div style={{display:"flex",alignItems:"center",gap:10}}><div style={{flex:1,height:4,borderRadius:99,background:"rgba(255,255,255,0.06)",overflow:"hidden"}}><div style={{height:"100%",width:`${dimProgress}%`,background:dim.color,borderRadius:99,transition:"width 0.4s ease"}}/></div><span style={{fontFamily:"'Outfit', sans-serif",fontSize:12,color:"#555"}}>{currentQ+1}/{dim.questions.length}</span></div></div><div style={{direction:"rtl",textAlign:"right",marginBottom:28,minHeight:60}}><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:17,fontWeight:600,lineHeight:1.8,color:"#eee"}}>{q}</p></div><div style={{display:"flex",flexDirection:"column",gap:10,direction:"rtl","--ac":dim.color,"--ac-bg":`${dim.color}15`}}>{optLabels.map((opt)=>{const sel=answers[qKey]===opt.val;return(<button key={opt.val} className={`opt-btn ${sel?"selected":""}`} onClick={()=>handleAnswer(opt.val)} style={sel?{borderColor:dim.color,background:`${dim.color}12`,color:"#fff"}:{}}><span style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700,fontFamily:"'Outfit', sans-serif",background:sel?dim.color:"rgba(255,255,255,0.06)",color:sel?"#0a0a0f":"#666",flexShrink:0,transition:"all .2s"}}>{opt.val}</span><span>{opt.ar}</span><span style={{marginRight:"auto",fontSize:12,color:"#555",fontFamily:"'Outfit', sans-serif"}}>{opt.en}</span></button>);})}</div></div></div></div>);}
if(screen==="results"){const res=calcResults();const level=getLevel(res.pct);const sorted=[...res.dimScores].sort((a,b)=>a.score/a.max-b.score/b.max);const weakest=sorted.slice(0,3);const strongest=sorted.slice(-3).reverse();return(<div style={{minHeight:"100vh",background:"#0a0a0f",color:"#fff",position:"relative",overflow:"hidden"}}><style>{styles}</style><div className="glow glow-anim" style={{width:400,height:400,background:level.color,top:-100,left:"50%",marginLeft:-200}}/><div style={{maxWidth:560,margin:"0 auto",padding:"40px 24px",position:"relative",zIndex:1}}><div style={{textAlign:"center",marginBottom:40}}><div style={{display:"inline-block",padding:"6px 20px",borderRadius:99,background:`${level.color}15`,border:`1px solid ${level.color}30`,marginBottom:20}}><span style={{fontFamily:"'Outfit', sans-serif",fontSize:12,fontWeight:600,color:level.color,letterSpacing:1.5,textTransform:"uppercase"}}>Assessment Complete</span></div><h1 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:28,fontWeight:900,marginBottom:8,color:"#fff"}}>نتيجة تقييمك</h1></div><div className="result-card" style={{textAlign:"center",marginBottom:24}}><div className="glow" style={{width:200,height:200,background:level.color,top:"50%",left:"50%",marginTop:-100,marginLeft:-100,opacity:0.08}}/><RadialChart percentage={res.pct} color={level.color}/><div style={{marginTop:16}}><span style={{fontSize:40,display:"block",marginBottom:8}}>{level.emoji}</span><h2 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:24,fontWeight:800,color:level.color,marginBottom:4}}>{level.title}</h2><span style={{fontFamily:"'Outfit', sans-serif",fontSize:13,color:"#555"}}>{level.titleEn}</span></div><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:15,color:"#aaa",lineHeight:1.8,marginTop:16,direction:"rtl"}}>{level.message}</p></div><div className="result-card" style={{marginBottom:24}}><h3 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:16,fontWeight:700,marginBottom:20,direction:"rtl",color:"#ddd"}}>📊 تفصيل المحاور</h3>{res.dimScores.map((ds,i)=>(<DimensionBar key={ds.dim.id} dim={ds.dim} score={ds.score} max={ds.max} delay={i*120}/>))}</div><div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,marginBottom:24}}><div className="result-card" style={{padding:24}}><h4 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:14,fontWeight:700,color:"#6BC9A0",marginBottom:14,direction:"rtl"}}>💪 نقاط القوة</h4>{strongest.map((s)=>(<div key={s.dim.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,direction:"rtl"}}><span style={{fontSize:16}}>{s.dim.icon}</span><span style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:12,color:"#aaa"}}>{s.dim.title}</span><span style={{marginRight:"auto",fontFamily:"'Outfit', sans-serif",fontSize:12,fontWeight:700,color:"#6BC9A0"}}>{Math.round((s.score/s.max)*100)}%</span></div>))}</div><div className="result-card" style={{padding:24}}><h4 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:14,fontWeight:700,color:"#E06B6B",marginBottom:14,direction:"rtl"}}>🎯 تحتاج تطوير</h4>{weakest.map((s)=>(<div key={s.dim.id} style={{display:"flex",alignItems:"center",gap:8,marginBottom:10,direction:"rtl"}}><span style={{fontSize:16}}>{s.dim.icon}</span><span style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:12,color:"#aaa"}}>{s.dim.title}</span><span style={{marginRight:"auto",fontFamily:"'Outfit', sans-serif",fontSize:12,fontWeight:700,color:"#E06B6B"}}>{Math.round((s.score/s.max)*100)}%</span></div>))}</div></div><div className="result-card" style={{marginBottom:24,borderColor:`${level.color}20`}}><h3 style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:16,fontWeight:700,marginBottom:12,direction:"rtl",color:level.color}}>📌 نصيحة من الكتاب</h3><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:14,color:"#aaa",lineHeight:1.8,direction:"rtl"}}>{level.advice}</p><div style={{marginTop:16,padding:"12px 16px",borderRadius:12,background:"rgba(255,255,255,0.03)",direction:"rtl"}}><p style={{fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:13,color:"#888",lineHeight:1.7,fontStyle:"italic"}}>"الأسواق لا تكافئ الأفكار، بل تكافئ التنفيذ الصحيح"<br/><span style={{fontSize:11,color:"#555"}}>— محمد حميدة، طريقك لبناء Startup</span></p></div></div><div style={{display:"flex",gap:12,justifyContent:"center",marginBottom:40}}><button className="landing-btn" onClick={()=>{setScreen("landing");setAnswers({});setCurrentDim(0);setCurrentQ(0);}} style={{background:"rgba(255,255,255,0.06)",color:"#aaa",fontSize:14,padding:"14px 28px",border:"1px solid rgba(255,255,255,0.1)"}}>أعد التقييم</button></div><p style={{textAlign:"center",fontFamily:"'Noto Kufi Arabic', sans-serif",fontSize:11,color:"#444"}}>Founder Readiness Assessment — مبني على كتاب "طريقك لبناء Startup"</p></div></div>);}}
